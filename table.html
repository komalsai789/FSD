<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
    <style>
        table,th,td
        {
           border: 2px solid black;
           border-collapse:collapse;
           text-align: center;
           margin:0 auto;

        }
    </style>

</head>
<body>

<h2 align="center">Table Demonstration</h2>

<table border="2" align="centre">
    <!-- Table Header Row -->
    <tr>
        <th rowspan="2">S.No</th>
        <th colspan="2">Student Details</th>
        <th rowspan="2">Marks</th>
    </tr>

    <tr>
        <th>Name</th>
        <th>Department</th>
    </tr>

    <!-- Row 1 -->
    <tr>
        <td>1</td>
        <td>komal</td>
        <td>CIC</td>
        <td>89</td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td>2</td>
        <td>nandini</td>
        <td>CSE</td>
        <td>92</td>
    </tr>

</table>

</body>
</html>
