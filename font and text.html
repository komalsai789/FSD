<!DOCTYPE html>
<html>
<head>
<title>CSS Font and Text Example</title>

<style>
.size {
    font-size: 30px;
}

.weight {
    font-weight: bold;
}

.style {
    font-style: italic;
}

.decoration {
    text-decoration: underline;
}

.transform {
    text-transform: uppercase;
}

.align {
    text-align: center;
}
</style>

</head>
<body>

<h2 class="size">Example of Font Size</h2>

<p class="weight">This text shows Font Weight (Bold).</p>
<p class="style">This text shows Font Style (Italic).</p>
<p class="decoration">This text shows Text Decoration (Underline).</p>
<p class="transform">This text shows text transformation.</p>
<p class="align">This text is center aligned.</p>

</body>
</html>
