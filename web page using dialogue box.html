<!DOCTYPE html>
<html>
<head>
<title>Voter Check</title>

<script>
var name = prompt("Enter your name");
var age = prompt("Enter your age");

var status;

if(age >= 18)
status = "Can Vote";
else
status = "Cannot Vote";

document.write("<table border=10>");
document.write("<tr><th>Name</th><th>Age</th><th>Status</th></tr>");
document.write("<tr><td>"+name+"</td><td>"+age+"</td><td>"+status+"</td></tr>");
document.write("</table>");
</script>

</head>
<body>
</body>
</html>
