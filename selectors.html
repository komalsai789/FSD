<!DOCTYPE html>
<html>
<head>
    <title>CSS Selector Forms</title>

    <style>
        /* ===== SIMPLE SELECTORS ===== */

        /* Element selector */
        p {
            color: blue;
        }

        /* ID selector */
        #main {
            background-color: lightyellow;
            padding: 10px;
        }

        /* Class selector */
        .highlight {
            color: red;
            font-weight: bold;
        }

        /* Group selector */
        h1, h2 {
            color: green;
        }

        /* Universal selector */
        * {
            font-family: Arial;
        }

        /* ==== COMBINATORY SELECTORS ===== */

        /* Descendant selector */
        div p {
            font-style: italic;
        }

        /* Child selector */
        div > h2 {
            color: purple;
        }

        /* Adjacent sibling selector */
        h2 + p {
            background-color: lightgray;
        }

        /* General sibling selector */
        h2 ~ p {
            border-left: 4px solid orange;
            padding-left: 5px;
        }

        /* ===== PSEUDO-CLASS SELECTORS ===== */

        a:hover {
            color: red;
        }

        li:first-child {
            color: darkblue;
        }

        /* ===== PSEUDO-ELEMENT SELECTORS ===== */

        p::first-letter {
            font-size: 25px;
            color: brown;
        }
 
        /* ===== ATTRIBUTE SELECTORS ===== */

        input[type="text"] {
            background-color: lightpink;
        }

        input[type="password"] {
            background-color: lightblue;
        }
    </style>
</head>

<body>

    <h1>CSS Selector Forms</h1>

    <div id="main">
        <p>This paragraph uses element selector.</p>
        <p class="highlight">This paragraph uses class selector.</p>
        <span>Child selector applied here</span>
    </div>

    <h2>Combinator Example</h2>
    <p>Adjacent sibling paragraph</p>
    <p>General sibling paragraph</p>

    <h2>Pseudo Class & Element</h2>
    <a href="#">Hover over this link</a>

    <h2>Attribute Selector</h2>
    <form>
        Username: <input type="text"><br><br>
        Password: <input type="password">
    </form>

</body>
</html>
