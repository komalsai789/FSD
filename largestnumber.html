<!DOCTYPE html>
<html>
<head>
    <title>Largest Number</title>
</head>
<body>

<script>
    // Get three integers from the user
    let num1 = parseInt(prompt("Enter first integer:"));
    let num2 = parseInt(prompt("Enter second integer:"));
    let num3 = parseInt(prompt("Enter third integer:"));

    // Check conditions
    if (num1 === num2 && num2 === num3) {
        alert("EQUAL NUMBERS");
        document.write("<h2>EQUAL NUMBERS</h2>");
    } 
    else {
        let largest = num1;

        if (num2 > largest) {
            largest = num2;
        }

        if (num3 > largest) {
            largest = num3;
        }

        alert(largest + " LARGER NUMBER");
        document.write("<h2>" + largest + " LARGER NUMBER</h2>");
    }
</script>

</body>
</html>
