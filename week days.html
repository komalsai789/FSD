<!DOCTYPE html>
<html>
<head>
    <title>Week Days</title>
</head>
<body>

<script>
    // Get number from user
    let day = parseInt(prompt("Enter a number (1-7):"));
    let dayName;

    switch(day) {
        case 1:
            dayName = "Sunday";
            break;
        case 2:
            dayName = "Monday";
            break;
        case 3:
            dayName = "Tuesday";
            break;
        case 4:
            dayName = "Wednesday";
            break;
        case 5:
            dayName = "Thursday";
            break;
        case 6:
            dayName = "Friday";
            break;
        case 7:
            dayName = "Saturday";
            break;
        default:
            dayName = "Invalid input! Please enter number between 1 and 7.";
    }

    // Display result
    document.write("<h2>" + dayName + "</h2>");
</script>

</body>
</html>
