<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Semantic Tags Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        header, footer, nav, section, article, aside {
            border: 1px solid #333;
            padding: 10px;
            margin: 10px 0;
        }
        nav a {
            margin-right: 10px;
        }
        figure {
            border: 1px solid #666;
            padding: 5px;
            width: 200px;
        }
        span {
            color: blue;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website Header</h1>
    <p>Welcome to my <span>HTML Demo Page</span></p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

        <h2>Introduction Section</h2>
        <div>
            <p>This is a paragraph inside a <span>&lt;div&gt;</span> element.</p>
        </div>
    </section>

        <h2>Article Title</h2>

            <figcaption>This is a sample image caption</figcaption>
        </figure>
