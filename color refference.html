<!DOCTYPE html>
<html>
<head>
    <title>CSS Color References</title>
    <style>

        .colorName {
            background-color: red;
            color: white;
            padding: 10px;
        }

        .hexColor {
            background-color: #0000FF;
            color: white;
            padding: 10px;
        }

        .rgbColor {
            background-color: rgb(0, 255, 0);
            color: black;
            padding: 10px;
        }

        .rgbaColor {
            background-color: rgba(255, 0, 0, 0.5);
            color: black;
            padding: 10px;
        }

        .hslColor {
            background-color: hsl(240, 100%, 50%);
            color: white;
            padding: 10px;
        }

        .hslaColor {
            background-color: hsla(120, 100%, 25%, 0.7);
            color: white;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2>Different Ways to Reference Colors in CSS</h2>

    <div class="colorName">This uses Color Name (red)</div>
    <div class="hexColor">This uses Hexadecimal (#0000FF)</div>
    <div class="rgbColor">This uses RGB (0,255,0)</div>
    <div class="rgbaColor">This uses RGBA (with transparency)</div>
    <div class="hslColor">This uses HSL</div>
    <div class="hslaColor">This uses HSLA (with transparency)</div>

</body>
</html>
